[build]
builder = "NIXPACKS"

[deploy]
# Build the FFBridge Elo parquet on the mounted volume *before* launching
# Streamlit, then start the app. This must happen in the start command (not a
# preDeployCommand): Railway does NOT mount volumes during pre-deploy, so only
# the runtime container can read the raw tournament cache and write the parquet.
#
# The builder runs as a short-lived process that exits (freeing its memory)
# before Streamlit starts, keeping the memory-heavy history build out of the
# long-running app process (the OOM/restart-loop cause). ``--if-stale`` makes it
# a ~1s no-op on ordinary restarts/redeploys (parquet already fresh) and a full
# refresh only when the cache is older than the threshold — i.e. on the daily
# scheduled redeploy (see .github/workflows/ffbridge-daily-rebuild.yml).
#
# ``&&`` (not ``;``): the builder returns 0 even on a network/build hiccup (the
# app then falls back to its in-process rebuild), but returns nonzero if the
# startup preflight fails — i.e. a real deploy misconfiguration such as an unset
# or unmounted FFBRIDGE_CACHE_DIR. In that case Streamlit is intentionally NOT
# started so the bad deploy fails loudly instead of silently using ephemeral disk.
#
# ``--fetch-iv`` MUST match the app, which hardcodes ``fetch_iv = True``. The
# parquet cache key includes the fetch_iv flag (..._iv_1 vs ..._iv_0); if the
# builder omits this it writes ..._iv_0 while the app looks for ..._iv_1, so the
# app never finds the prebuilt parquet and rebuilds in-process. Keep in sync with
# streamlit_app_ffbridge_elo_ratings.py's fetch_iv.
startCommand = "python build_ffbridge_elo_parquets.py --if-stale --fetch-iv && streamlit run streamlit_app_ffbridge_elo_ratings.py --server.port $PORT --server.address 0.0.0.0"
# ALWAYS (not ON_FAILURE): Railway periodically recycles/migrates volume-backed
# containers. When it does, it sends SIGTERM and Streamlit shuts down *gracefully*
# (exit code 0). ON_FAILURE only restarts on a non-zero exit, so a graceful stop
# left the app permanently down (edge router then returns 404 "Application not
# found"). ALWAYS restarts after any exit so the app self-heals from platform
# recycles. maxRetries still bounds a genuine crash/preflight-failure loop.
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
# Generous timeout so the daily full rebuild (fetch new events + recompute,
# ~1-3 min) completes before Streamlit must answer the health check.
healthcheckTimeout = 900
