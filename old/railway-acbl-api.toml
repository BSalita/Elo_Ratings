[deploy]
# MALLOC_ARENA_MAX=2 limits glibc's per-thread allocation arenas so freed
# per-request memory is actually returned to the OS (with malloc_trim) instead
# of fragmenting across many arenas and inflating RSS over time.
startCommand = "MALLOC_ARENA_MAX=2 uvicorn acbl_api_server:app --host 0.0.0.0 --port $PORT"
# ALWAYS (not ON_FAILURE): Railway periodically recycles containers, sending
# SIGTERM. uvicorn shuts down gracefully (exit 0), which ON_FAILURE does not
# treat as a failure, so the app stays down and the edge router returns 404
# "Application not found". ALWAYS restarts after any exit so the API self-heals;
# maxRetries still bounds a genuine crash loop.
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"

